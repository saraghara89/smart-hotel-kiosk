<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reservation Summary</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <main class="app-shell">

    <section class="kiosk-card summary-premium">

      <div class="summary-top">

        <div>
          <p class="eyebrow">Verified Reservation</p>
          <h1>Your Stay</h1>
        </div>

        <div class="status-badge">
          Confirmed
        </div>

      </div>

      <div class="guest-card">

        <div class="guest-avatar">
          SH
        </div>

        <div>
          <p class="guest-label">Guest</p>
          <h2 id="guestName">-</h2>
        </div>

      </div>

      <div class="reservation-grid">

        <div class="info-card">
          <span>Stay Dates</span>
          <strong id="dates">-</strong>
        </div>

        <div class="info-card">
          <span>Room Type</span>
          <strong id="room">-</strong>
        </div>

        <div class="info-card">
          <span>Guests</span>
          <strong id="guests">-</strong>
        </div>

        <div class="info-card">
          <span>View</span>
          <strong id="view">-</strong>
        </div>

      </div>

      <div class="payment-section">

        <div>
          <p class="payment-title">Payment Status</p>
          <h3 id="payment">-</h3>
        </div>

        <div class="paid-indicator">
          Paid
        </div>

      </div>

      <div class="services-box">

        <p class="services-title">Included Services</p>

        <div class="services-list">
          <span>Breakfast</span>
          <span>Pool Access</span>
          <span>Wi-Fi</span>
          <span>Parking</span>
        </div>

      </div>

      <div class="action-panel summary-buttons">
        <a href="#" class="secondary-btn">Edit Details</a>
        <a href="thankyou.html" class="primary-btn">
          Complete Check-In
        </a>
      </div>

    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
